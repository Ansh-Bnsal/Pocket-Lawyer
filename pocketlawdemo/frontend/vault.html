<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Vault – Pocket Lawyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 24px; }
    .doc-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border-color); transition: var(--transition); position: relative; overflow: hidden; }
    .doc-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
    .doc-icon { font-size: 2.5rem; margin-bottom: 16px; display: block; }
    .doc-type { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
    .doc-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
    .doc-meta { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; }
    .doc-actions { display: flex; gap: 8px; border-top: 1px solid var(--border-color); padding-top: 16px; }
    .status-pill { padding: 4px 10px; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 700; }
    .status-signed { background: rgba(52, 211, 153, 0.1); color: #34d399; }
    .status-draft { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⚖️</span>
        <span class="logo-text">Pocket<span class="logo-accent">Lawyer</span></span>
      </a>
      <div class="nav-actions">
        <span class="btn btn-ghost" id="user-greeting"></span>
        <a href="#" class="btn btn-ghost btn-sm" onclick="API.logout()">Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <a href="dashboard.html" class="sidebar-link">
          <span class="link-icon">📊</span> Overview
        </a>
        <a href="case.html" class="sidebar-link">
          <span class="link-icon">🧠</span> AI Copilot
        </a>
        <a href="legal_services.html" class="sidebar-link">
          <span class="link-icon">🛡️</span> Legal Services
        </a>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-label">My Records</div>
        <a href="vault.html" class="sidebar-link active">
          <span class="link-icon">📂</span> Digital Vault
        </a>
        <a href="discovery.html" class="sidebar-link">
          <span class="link-icon">🔍</span> Find a Lawyer
        </a>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <div>
          <h1>Digital Vault</h1>
          <p>Securely manage and verify your signed legal documents</p>
        </div>
        <div style="display:flex; gap:12px;">
            <button class="btn btn-ghost" onclick="location.href='legal_services.html'"><span>🛡️</span> New Service</button>
            <button class="btn btn-primary" onclick="alert('Upload to Vault coming soon!')"><span>📤</span> Upload Doc</button>
        </div>
      </div>

      <div class="filter-group" style="margin-bottom:24px;">
        <button class="filter-chip active">All Clips</button>
        <button class="filter-chip">Signed Docs</button>
        <button class="filter-chip">Drafts</button>
        <button class="filter-chip">Evidence</button>
      </div>

      <div id="vault-list" class="vault-grid"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!API.isLoggedIn()) window.location.href = 'login.html';
      const user = API.getUser();
      document.getElementById('user-greeting').innerText = `Hi, ${user.name}`;
      loadVault();
    });

    async function loadVault() {
      const list = document.getElementById('vault-list');
      try {
        const logs = await API.getServiceLogs();
        
        const items = logs.map(l => {
          const details = JSON.parse(l.details || '{}');
          const isSigned = l.service_type === 'esign' || l.service_type === 'estamp';
          const filename = details.filename || (isSigned ? 'signed_doc_177.pdf' : null);
          const icon = l.service_type === 'rent_agreement' ? '🏠' : l.service_type === 'affidavit' ? '⚖️' : '📄';
          
          if (!filename) return '';

          return `
            <div class="doc-card">
              <span class="doc-icon">${icon}</span>
              <span class="doc-type">${l.service_type.replace('_', ' ')}</span>
              <h3 class="doc-title">${l.title || getServiceName(l.service_type)}</h3>
              <div class="doc-meta">
                <span>🗓️ ${new Date(l.created_at).toLocaleDateString()}</span>
                <span class="status-pill status-${isSigned ? 'signed' : 'draft'}">${isSigned ? 'SIGNED' : 'DRAFT'}</span>
              </div>
              <div class="doc-actions">
                <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="triggerDownload('${API.getDownloadUrl(filename)}', '${filename}')">View</button>
                <button class="btn btn-ghost btn-sm" style="padding:8px;" title="Share Securely">🔗</button>
              </div>
            </div>
          `;
        }).join('');

        list.innerHTML = items || `
            <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: var(--bg-surface); border-radius: 20px; border: 1px dashed var(--border-color);">
                <span style="font-size: 3rem; display: block; margin-bottom: 20px;">📂</span>
                <h3>Your Vault is Empty</h3>
                <p style="color: var(--text-muted);">Initiate a legal service to see your documents here.</p>
            </div>
        `;
      } catch (err) { Utils.showToast(err.message, 'error'); }
    }

    function getServiceName(id) {
      const names = { esign: 'Aadhaar eSign', estamp: 'Digital Stamp Paper', kyc: 'Video KYC', rent_agreement: 'Rent Agreement', affidavit: 'General Affidavit' };
      return names[id] || id;
    }

    function triggerDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
    }
  </script>
</body>
</html>
