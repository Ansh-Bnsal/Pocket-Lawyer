<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Pocket Lawyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Nav -->
  <nav class="navbar scrolled" id="main-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⚖️</span>
        <span class="logo-text">Pocket<span class="logo-accent">Lawyer</span></span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link active">Dashboard</a>
        <a href="case.html" class="nav-link">AI Assistant</a>
      </div>
      <div class="nav-actions">
        <span class="btn btn-ghost" id="user-greeting"></span>
        <a href="#" class="btn btn-ghost btn-sm" id="logout-btn" onclick="handleLogout()">Logout</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <a href="dashboard.html" class="sidebar-link active">
          <span class="link-icon">📊</span> Overview
        </a>
        <a href="case.html" class="sidebar-link">
          <span class="link-icon">🧠</span> AI Assistant
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Cases</div>
        <a href="#" class="sidebar-link" onclick="filterCases('all')">
          <span class="link-icon">📋</span> All Cases
          <span class="link-badge" id="total-cases-badge">0</span>
        </a>
        <a href="#" class="sidebar-link" onclick="filterCases('active')">
          <span class="link-icon">🟢</span> Active
        </a>
        <a href="#" class="sidebar-link" onclick="filterCases('pending')">
          <span class="link-icon">🟡</span> Pending
        </a>
        <a href="#" class="sidebar-link" onclick="filterCases('closed')">
          <span class="link-icon">⚫</span> Closed
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Actions</div>
        <a href="#" class="sidebar-link" onclick="openCreateCase()">
          <span class="link-icon">➕</span> New Case
        </a>
        <a href="#" class="sidebar-link" onclick="handleLogout()">
          <span class="link-icon">🚪</span> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main" id="dashboard-main">
      <div class="dashboard-header">
        <div>
          <h1 id="welcome-msg">Dashboard</h1>
          <p>Manage your legal cases and track progress</p>
        </div>
        <button class="btn btn-primary" onclick="openCreateCase()">
          <span>➕</span> New Case
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- Case List -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 id="case-list-title" style="font-size:1.3rem;">Your Cases</h2>
        <div class="filter-group" id="case-filters">
          <button class="filter-chip active" onclick="filterCases('all')">All</button>
          <button class="filter-chip" onclick="filterCases('active')">Active</button>
          <button class="filter-chip" onclick="filterCases('pending')">Pending</button>
          <button class="filter-chip" onclick="filterCases('closed')">Closed</button>
        </div>
      </div>

      <div id="case-list" class="case-list"></div>
    </main>
  </div>

  <!-- Create Case Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content" style="max-width:600px;">
      <div class="modal-header">
        <h3>Create New Case</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="create-case-form" onsubmit="handleCreateCase(event)">
        <div class="form-group">
          <label class="form-label">Case Type</label>
          <div class="case-type-grid" id="case-type-selector"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="case-title">Case Title</label>
          <input type="text" id="case-title" class="form-input" placeholder="e.g., Landlord security deposit dispute" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="case-desc">Describe Your Issue</label>
          <textarea id="case-desc" class="form-textarea" rows="5" placeholder="Describe your legal issue in detail. Include relevant facts, dates, and what outcome you're seeking." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Risk Level (your assessment)</label>
          <div class="filter-group">
            <button type="button" class="filter-chip" onclick="selectRisk('low')" data-risk="low">🟢 Low</button>
            <button type="button" class="filter-chip active" onclick="selectRisk('medium')" data-risk="medium">🟡 Medium</button>
            <button type="button" class="filter-chip" onclick="selectRisk('high')" data-risk="high">🔴 High</button>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;">
          <button type="button" class="btn btn-ghost" onclick="closeModal()" style="flex:1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:2;">Create Case</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/case.js"></script>
  <script>
    document.getElementById('nav-toggle')?.addEventListener('click', () => {
      document.getElementById('nav-links')?.classList.toggle('open');
    });
  </script>
</body>
</html>
