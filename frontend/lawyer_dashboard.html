<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawyer Dashboard – Pocket Lawyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar scrolled"><div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="logo-icon">⚖️</span><span class="logo-text">Pocket<span class="logo-accent">Lawyer</span></span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="lawyer_dashboard.html" class="nav-link active">Dashboard</a>
      <a href="case.html" class="nav-link">AI Assistant</a>
    </div>
    <div class="nav-actions">
      <span class="btn btn-ghost" id="user-greeting"></span>
      <a href="#" class="btn btn-ghost btn-sm" onclick="handleLogout()">Logout</a>
    </div>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div></nav>

  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Lawyer Panel</div>
        <a href="lawyer_dashboard.html" class="sidebar-link active"><span class="link-icon">📊</span> Overview</a>
        <a href="case.html" class="sidebar-link"><span class="link-icon">🧠</span> AI Assistant</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Assigned Cases</div>
        <a href="#" class="sidebar-link" onclick="filterCases('all')"><span class="link-icon">📋</span> All Cases <span class="link-badge" id="total-badge">0</span></a>
        <a href="#" class="sidebar-link" onclick="filterCases('active')"><span class="link-icon">🟢</span> Active</a>
        <a href="#" class="sidebar-link" onclick="filterCases('pending')"><span class="link-icon">🟡</span> Pending</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Account</div>
        <a href="#" class="sidebar-link" onclick="showProfile()"><span class="link-icon">👤</span> My Profile</a>
        <a href="#" class="sidebar-link" onclick="handleLogout()"><span class="link-icon">🚪</span> Logout</a>
      </div>
    </aside>

    <main class="dashboard-main" id="dashboard-main">
      <div class="dashboard-header">
        <div>
          <h1 id="welcome-msg">Lawyer Dashboard</h1>
          <p>Manage assigned cases and track your work</p>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <!-- Profile card -->
      <div id="profile-section" style="display:none;margin-bottom:32px;">
        <div class="case-detail-header" id="profile-card"></div>
      </div>

      <h2 style="font-size:1.3rem;margin-bottom:16px;" id="cases-title">Assigned Cases</h2>
      <div id="case-list" class="case-list"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.getElementById('nav-toggle')?.addEventListener('click', () => document.getElementById('nav-links')?.classList.toggle('open'));

    let currentFilter = 'all';
    let allCases = [];

    document.addEventListener('DOMContentLoaded', async () => {
      if (!Utils.requireAuth()) return;
      const user = API.getUser();
      if (user.role !== 'lawyer') { window.location.href = 'dashboard.html'; return; }

      document.getElementById('user-greeting').textContent = '⚖️ ' + user.name;
      document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.name.split(' ')[0];

      try { allCases = await API.getCases(); } catch(e) { allCases = []; }
      renderStats();
      renderCases();
    });

    function handleLogout() { API.logout(); }

    function renderStats() {
      const cases = allCases;
      const active = cases.filter(c => c.status === 'active').length;

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-card-icon blue">📋</div><h3>${cases.length}</h3><p>Assigned Cases</p></div>
        <div class="stat-card"><div class="stat-card-icon green">🟢</div><h3>${active}</h3><p>Active Cases</p></div>
        <div class="stat-card"><div class="stat-card-icon amber">📅</div><h3>0</h3><p>Hearings</p></div>
        <div class="stat-card"><div class="stat-card-icon purple">📂</div><h3>0</h3><p>Documents</p></div>
      `;
      document.getElementById('total-badge').textContent = cases.length;
    }

    function renderCases(filter) {
      filter = filter || currentFilter;
      let cases = [...allCases];
      if (filter !== 'all') cases = cases.filter(c => c.status === filter);
      cases.sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));

      const el = document.getElementById('case-list');
      if (cases.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><h3>No assigned cases</h3><p>Cases will appear here when clients assign you.</p></div>`;
        return;
      }

      el.innerHTML = cases.map(c => `
        <a href="case_detail.html?id=${c.id}" class="case-item">
          <span class="case-status-dot ${c.status}"></span>
          <div class="case-info">
            <h4>${Utils.escapeHtml(c.title)}</h4>
            <p>${Utils.getCaseTypeIcon(c.case_type)} ${Utils.getCaseTypeLabel(c.case_type)} · Client: ${Utils.escapeHtml(c.client_name || '')}</p>
          </div>
          <div class="case-meta">
            <span class="badge badge-${Utils.statusColors[c.status] || 'neutral'}">${c.status}</span>
            <span class="case-date">${Utils.timeAgo(c.updated_at || c.created_at)}</span>
          </div>
        </a>
      `).join('');
    }

    function filterCases(f) { currentFilter = f; renderCases(f); }

    function showProfile() {
      const user = API.getUser();
      const section = document.getElementById('profile-section');
      section.style.display = section.style.display === 'none' ? 'block' : 'none';
      document.getElementById('profile-card').innerHTML = `
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
          <div class="lawyer-avatar" style="width:64px;height:64px;font-size:1.5rem;">${Utils.getInitials(user.name)}</div>
          <div>
            <h2 style="font-size:1.4rem;">${Utils.escapeHtml(user.name)}</h2>
            <p style="color:var(--text-muted);">${Utils.getCaseTypeLabel(user.specialization)} · ${user.experience || '?'} years experience</p>
          </div>
        </div>
        <div class="case-detail-meta">
          <div class="meta-item">📧 ${Utils.escapeHtml(user.email)}</div>
          <div class="meta-item">📋 Bar: ${Utils.escapeHtml(user.barNumber || 'Not provided')}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
